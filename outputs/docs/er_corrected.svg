<svg xmlns="http://www.w3.org/2000/svg" width="680" height="600" viewBox="0 0 680 600" font-family="Helvetica, Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#3d3d3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.t{font-size:13px;fill:#3d3d3a}
.ts{font-size:11px;fill:#73726c}
.th{font-size:13px;font-weight:700;fill:#2c2c2a}
.lbl{font-size:11px;fill:#73726c}
</style>

<text class="th" x="340" y="26" text-anchor="middle" font-size="14">oil_network — entity relationships (as enforced by the DDL)</text>

<rect x="28" y="44" width="624" height="296" rx="12" fill="none" stroke="#b9b8b2" stroke-width="1" stroke-dasharray="3 4"/>
<text class="lbl" x="44" y="62" font-style="italic">Structural layer — persistent, scenario-independent</text>

<rect x="255" y="74" width="170" height="70" rx="10" fill="#FFF2CC" stroke="#BA8B17" stroke-width="1"/>
<text class="th" x="340" y="98" text-anchor="middle">GRAPH</text>
<text class="ts" x="340" y="116" text-anchor="middle">graph_id (PK)</text>
<text class="ts" x="340" y="132" text-anchor="middle">one per topology view</text>

<text class="lbl" x="232" y="172" text-anchor="middle">1 &#8594; N</text>
<line x1="300" y1="144" x2="245" y2="196" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="40" y="200" width="160" height="84" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="120" y="224" text-anchor="middle">ASSET</text>
<text class="ts" x="120" y="244" text-anchor="middle">asset_id (PK)</text>
<text class="ts" x="120" y="260" text-anchor="middle">kind (physical|abstract)</text>
<text class="ts" x="120" y="276" text-anchor="middle">name, location_id</text>

<rect x="260" y="200" width="170" height="84" rx="10" fill="#E1F0E4" stroke="#3C8A57" stroke-width="1"/>
<text class="th" x="345" y="224" text-anchor="middle">NODE</text>
<text class="ts" x="345" y="244" text-anchor="middle">node_id (PK)</text>
<text class="ts" x="345" y="260" text-anchor="middle">asset_id (FK), graph_id (FK)</text>
<text class="ts" x="345" y="276" text-anchor="middle" font-style="italic">UNIQUE (graph_id, asset_id)</text>

<rect x="490" y="200" width="160" height="84" rx="10" fill="#E1F0E4" stroke="#3C8A57" stroke-width="1"/>
<text class="th" x="570" y="220" text-anchor="middle">VARIABLE</text>
<text class="ts" x="570" y="238" text-anchor="middle">variable_id (PK)</text>
<text class="ts" x="570" y="254" text-anchor="middle">node_id (FK)</text>
<text class="ts" x="570" y="270" text-anchor="middle">related_node_id (FK,</text>
<text class="ts" x="570" y="282" text-anchor="middle">nullable)</text>

<text class="lbl" x="230" y="236" text-anchor="middle">N &#8594; 1</text>
<line x1="260" y1="242" x2="204" y2="242" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="460" y="236" text-anchor="middle">1 &#8594; N</text>
<line x1="430" y1="242" x2="486" y2="242" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<path d="M530 200 C 510 168 470 168 450 196" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="lbl" x="490" y="164" text-anchor="middle">related_node_id &#8594; NODE (in/outflow edge)</text>

<rect x="255" y="396" width="170" height="74" rx="10" fill="#F8E3EC" stroke="#C0547E" stroke-width="1"/>
<text class="th" x="340" y="420" text-anchor="middle">SCENARIO</text>
<text class="ts" x="340" y="440" text-anchor="middle">scenario_id (PK)</text>
<text class="ts" x="340" y="456" text-anchor="middle">graph_id (FK)</text>

<rect x="40" y="540" width="300" height="60" rx="10" fill="#F8E3EC" stroke="#C0547E" stroke-width="1"/>
<text class="th" x="190" y="560" text-anchor="middle">VARIABLE ASSIGNMENT</text>
<text class="ts" x="190" y="578" text-anchor="middle">PK (scenario_id, variable_id, effective_from)</text>
<text class="ts" x="190" y="592" text-anchor="middle" font-style="italic">CHECK num_nonnulls(timeseries_id, formula)=1</text>

<text class="lbl" x="368" y="370" text-anchor="middle">graph_id (FK)</text>
<line x1="340" y1="284" x2="340" y2="392" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<text class="lbl" x="250" y="510" text-anchor="middle">1 &#8594; N</text>
<line x1="300" y1="470" x2="210" y2="536" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<text class="lbl" x="600" y="540" text-anchor="middle">1 &#8594; N</text>
<line x1="570" y1="284" x2="570" y2="570" stroke="#888780" stroke-width="1" fill="none"/>
<line x1="570" y1="570" x2="344" y2="570" stroke="#3d3d3a" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="430" y="356" width="220" height="76" rx="8" fill="none" stroke="#b9b8b2" stroke-width="1" stroke-dasharray="3 4"/>
<text class="th" x="540" y="376" text-anchor="middle" font-size="12">Same-graph triggers</text>
<text class="ts" x="540" y="394" text-anchor="middle">variables_check_same_graph</text>
<text class="ts" x="540" y="410" text-anchor="middle">variable_assignments_check_graph</text>
<text class="ts" x="540" y="426" text-anchor="middle" font-style="italic">scenario.graph = variable.node.graph</text>

<rect x="28" y="520" width="624" height="80" rx="12" fill="none" stroke="#b9b8b2" stroke-width="1" stroke-dasharray="3 4"/>
<text class="lbl" x="44" y="538" font-style="italic">Scenario layer — volatile, per scenario</text>
</svg>
