<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 990" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#333"/>
    </marker>
    <marker id="arr-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#888"/>
    </marker>
  </defs>
  <style>
    .ttl     { font-size: 18px; font-weight: 700; fill: #111; }
    .sub     { font-size: 12px; fill: #666; }
    .lyr-num { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; }
    .lyr-ttl { font-size: 12.5px; font-weight: 700; }
    .box-ttl { font-family: ui-monospace, "SF Mono", Consolas, Menlo, monospace; font-size: 12px; font-weight: 600; fill: #111; }
    .box-sub { font-size: 10.5px; fill: #555; }
    .arr-lbl { font-size: 10px; fill: #555; font-style: italic; }
    .feat    { font-size: 10.5px; fill: #5a1d80; font-style: italic; }
  </style>

  <text x="640" y="32" class="ttl" text-anchor="middle">Physical flow of crude oil through the logistics network</text>
  <text x="640" y="50" class="sub" text-anchor="middle">production → gathering → transport → optional storage → refinery → products</text>

  <!-- ===================================================== -->
  <!-- LAYER 1: PRODUCTION                                     -->
  <!-- ===================================================== -->
  <rect x="40" y="80" width="1200" height="130" rx="10" ry="10" fill="#fff5e6" stroke="#d99e3a" stroke-width="1.2"/>
  <text x="60" y="102" class="lyr-num" fill="#a06200">PRODUCTION</text>
  <text x="60" y="118" class="lyr-ttl" fill="#7a4a00">where crude originates — source nodes</text>

  <rect x="120" y="135" width="280" height="60" rx="6" ry="6" fill="#fff" stroke="#d99e3a" stroke-width="1.5"/>
  <text x="260" y="160" class="box-ttl" text-anchor="middle">Onshore wells</text>
  <text x="260" y="180" class="box-sub" text-anchor="middle">conventional fields, mature plays</text>

  <rect x="500" y="135" width="280" height="60" rx="6" ry="6" fill="#fff" stroke="#d99e3a" stroke-width="1.5"/>
  <text x="640" y="160" class="box-ttl" text-anchor="middle">Offshore platforms</text>
  <text x="640" y="180" class="box-sub" text-anchor="middle">fixed rigs, FPSOs, deepwater</text>

  <rect x="880" y="135" width="280" height="60" rx="6" ry="6" fill="#fff" stroke="#d99e3a" stroke-width="1.5"/>
  <text x="1020" y="160" class="box-ttl" text-anchor="middle">Shale / tight oil</text>
  <text x="1020" y="180" class="box-sub" text-anchor="middle">horizontal drilling + frac</text>

  <!-- ===================================================== -->
  <!-- LAYER 2: GATHERING                                      -->
  <!-- ===================================================== -->
  <rect x="40" y="240" width="1200" height="100" rx="10" ry="10" fill="#fef3f9" stroke="#a63a8c" stroke-width="1.2"/>
  <text x="60" y="262" class="lyr-num" fill="#80205c">GATHERING</text>
  <text x="60" y="278" class="lyr-ttl" fill="#5a0d40">small-diameter pipelines and battery sites — convergence point (fan-in)</text>

  <rect x="500" y="282" width="280" height="46" rx="6" ry="6" fill="#fff" stroke="#a63a8c" stroke-width="2"/>
  <text x="640" y="310" class="box-ttl" text-anchor="middle">Gathering hub</text>

  <!-- production -> gathering arrows -->
  <path d="M 260 195 L 590 282" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M 640 195 L 640 282" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M 1020 195 L 690 282" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <text x="900" y="265" class="feat" text-anchor="middle">⤓ convergence: state depends on combined upstream output</text>

  <!-- ===================================================== -->
  <!-- LAYER 3: TRANSPORT (parallel modes)                     -->
  <!-- ===================================================== -->
  <rect x="40" y="370" width="1200" height="160" rx="10" ry="10" fill="#e6f0ff" stroke="#3a78d9" stroke-width="1.2"/>
  <text x="60" y="392" class="lyr-num" fill="#1d4ea3">TRANSPORT</text>
  <text x="60" y="408" class="lyr-ttl" fill="#143a7a">three parallel modes — different transit times, capacities, costs</text>

  <rect x="120" y="425" width="280" height="80" rx="6" ry="6" fill="#fff" stroke="#3a78d9" stroke-width="1.5"/>
  <text x="260" y="450" class="box-ttl" text-anchor="middle">Pipelines</text>
  <text x="260" y="470" class="box-sub" text-anchor="middle">trunk + feeder lines</text>
  <text x="260" y="486" class="box-sub" text-anchor="middle">low marginal cost, long distance</text>
  <text x="260" y="500" class="box-sub" text-anchor="middle" font-style="italic">e.g., Gray Oak, Cactus II, DAPL, TAPS</text>

  <rect x="500" y="425" width="280" height="80" rx="6" ry="6" fill="#fff" stroke="#3a78d9" stroke-width="1.5"/>
  <text x="640" y="450" class="box-ttl" text-anchor="middle">Maritime tankers</text>
  <text x="640" y="470" class="box-sub" text-anchor="middle">VLCC, Suezmax, Aframax</text>
  <text x="640" y="486" class="box-sub" text-anchor="middle">cross-ocean, regional trades</text>
  <text x="640" y="500" class="box-sub" text-anchor="middle" font-style="italic">no pipeline option</text>

  <rect x="880" y="425" width="280" height="80" rx="6" ry="6" fill="#fff" stroke="#3a78d9" stroke-width="1.5"/>
  <text x="1020" y="450" class="box-ttl" text-anchor="middle">Rail / truck</text>
  <text x="1020" y="470" class="box-sub" text-anchor="middle">supplementary, short-haul</text>
  <text x="1020" y="486" class="box-sub" text-anchor="middle">where pipelines do not reach</text>
  <text x="1020" y="500" class="box-sub" text-anchor="middle" font-style="italic">e.g., Permian during ramp-ups</text>

  <!-- gathering -> transport arrows -->
  <path d="M 600 328 L 260 425" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M 640 328 L 640 425" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M 680 328 L 1020 425" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <text x="640" y="552" class="feat" text-anchor="middle">⤓ parallelism: disrupting one mode redistributes flow onto the others</text>

  <!-- ===================================================== -->
  <!-- LAYER 4: ROUTING DECISION                                -->
  <!-- ===================================================== -->
  <rect x="40" y="572" width="1200" height="130" rx="10" ry="10" fill="#e6ffe6" stroke="#3aa653" stroke-width="1.2"/>
  <text x="60" y="594" class="lyr-num" fill="#1f6b32">ROUTING DECISION</text>
  <text x="60" y="610" class="lyr-ttl" fill="#0f4a1d">direct to refinery, or via storage — a switching choice driven by economics</text>

  <rect x="180" y="622" width="280" height="68" rx="6" ry="6" fill="#fff" stroke="#3aa653" stroke-width="1.5"/>
  <text x="320" y="647" class="box-ttl" text-anchor="middle">Storage layer</text>
  <text x="320" y="666" class="box-sub" text-anchor="middle">tank farms, terminals, SPR sites</text>
  <text x="320" y="682" class="box-sub" text-anchor="middle" font-style="italic">e.g., Cushing, St. James, Bryan Mound</text>

  <rect x="820" y="622" width="280" height="68" rx="6" ry="6" fill="#fff" stroke="#3aa653" stroke-width="2"/>
  <text x="960" y="647" class="box-ttl" text-anchor="middle">Refinery (direct)</text>
  <text x="960" y="666" class="box-sub" text-anchor="middle">tightly coordinated, low holding cost</text>
  <text x="960" y="682" class="box-sub" text-anchor="middle" font-style="italic">when refinery demand is strong</text>

  <!-- transport (centre of layer 3) -> storage / refinery (split routing) -->
  <path d="M 260 505 C 260 555, 280 600, 320 622" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M 640 505 L 320 622" fill="none" stroke="#888" stroke-width="1.0" stroke-dasharray="3 2" marker-end="url(#arr-light)"/>
  <path d="M 1020 505 L 960 622" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M 640 505 L 960 622" fill="none" stroke="#888" stroke-width="1.0" stroke-dasharray="3 2" marker-end="url(#arr-light)"/>

  <!-- storage -> refinery (released as needed) -->
  <path d="M 460 656 L 820 656" fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="640" y="650" class="arr-lbl" text-anchor="middle">released to refinery as needed</text>
  <text x="640" y="678" class="feat" text-anchor="middle">⤴ time-buffer: stored at t, drawn at t + τ</text>

  <!-- ===================================================== -->
  <!-- LAYER 5: REFINING + PRODUCTS                             -->
  <!-- ===================================================== -->
  <rect x="40" y="730" width="1200" height="130" rx="10" ry="10" fill="#f4e8ff" stroke="#7c3aa6" stroke-width="1.2"/>
  <text x="60" y="752" class="lyr-num" fill="#5a1d80">REFINING / END USE</text>
  <text x="60" y="768" class="lyr-ttl" fill="#3d0e5a">transformation — and one corner case: direct-burn power</text>

  <rect x="120" y="780" width="320" height="68" rx="6" ry="6" fill="#fff" stroke="#7c3aa6" stroke-width="2"/>
  <text x="280" y="805" class="box-ttl" text-anchor="middle">Refinery (transformation)</text>
  <text x="280" y="824" class="box-sub" text-anchor="middle">distillation, FCC, reforming, hydrocracking</text>
  <text x="280" y="840" class="box-sub" text-anchor="middle">crude → slate of products</text>

  <rect x="500" y="780" width="380" height="68" rx="6" ry="6" fill="#fff" stroke="#7c3aa6" stroke-width="1.5"/>
  <text x="690" y="805" class="box-ttl" text-anchor="middle">Refined products → end-use markets</text>
  <text x="690" y="824" class="box-sub" text-anchor="middle">gasoline, diesel/jet, LPG, naphtha,</text>
  <text x="690" y="840" class="box-sub" text-anchor="middle">heavy fuel oil, petrochemical feedstocks</text>

  <rect x="930" y="780" width="240" height="68" rx="6" ry="6" fill="#fff" stroke="#7c3aa6" stroke-width="1.0" stroke-dasharray="4 3"/>
  <text x="1050" y="805" class="box-ttl" text-anchor="middle" font-size="11px">Direct-burn power plant</text>
  <text x="1050" y="824" class="box-sub" text-anchor="middle">Caribbean, island grids</text>
  <text x="1050" y="840" class="box-sub" text-anchor="middle" font-style="italic">corner case</text>

  <!-- refinery -> products + corner-case crude -> direct burn -->
  <path d="M 280 690 L 280 780" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 440 814 L 500 814" fill="none" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>
  <path d="M 960 690 L 1050 780" fill="none" stroke="#888" stroke-width="1.0" stroke-dasharray="3 2" marker-end="url(#arr-light)"/>

  <!-- backward influence note -->
  <path d="M 960 656 C 960 320, 600 280, 580 282" fill="none" stroke="#aaa" stroke-width="0.9" stroke-dasharray="5 3" marker-end="url(#arr-light)" opacity="0.7"/>
  <text x="1130" y="450" class="feat" text-anchor="middle" transform="rotate(-90 1130 450)">refinery turnaround propagates upstream as reduced offtake</text>

  <!-- ===================================================== -->
  <!-- LEGEND                                                   -->
  <!-- ===================================================== -->
  <rect x="40" y="890" width="1200" height="90" rx="8" ry="8" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="58" y="910" font-size="11" font-weight="700" letter-spacing="1.2" fill="#444">LEGEND</text>

  <!-- Layer colour swatches -->
  <rect x="58"  y="922" width="14" height="14" fill="#fff5e6" stroke="#d99e3a"/>
  <text x="78" y="934" font-size="10.5" fill="#444">Production (source nodes)</text>
  <rect x="220" y="922" width="14" height="14" fill="#fef3f9" stroke="#a63a8c"/>
  <text x="240" y="934" font-size="10.5" fill="#444">Gathering (convergence)</text>
  <rect x="380" y="922" width="14" height="14" fill="#e6f0ff" stroke="#3a78d9"/>
  <text x="400" y="934" font-size="10.5" fill="#444">Transport (parallel modes)</text>
  <rect x="555" y="922" width="14" height="14" fill="#e6ffe6" stroke="#3aa653"/>
  <text x="575" y="934" font-size="10.5" fill="#444">Routing decision (storage / direct)</text>
  <rect x="780" y="922" width="14" height="14" fill="#f4e8ff" stroke="#7c3aa6"/>
  <text x="800" y="934" font-size="10.5" fill="#444">Refining and end use</text>

  <!-- Arrow conventions -->
  <line x1="58" y1="958" x2="100" y2="958" stroke="#333" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="108" y="962" font-size="10.5" fill="#444">Primary flow path</text>
  <line x1="240" y1="958" x2="282" y2="958" stroke="#888" stroke-width="1.0" stroke-dasharray="3 2" marker-end="url(#arr-light)"/>
  <text x="290" y="962" font-size="10.5" fill="#444">Optional / conditional path</text>
  <line x1="478" y1="958" x2="520" y2="958" stroke="#aaa" stroke-width="0.9" stroke-dasharray="5 3" marker-end="url(#arr-light)" opacity="0.7"/>
  <text x="528" y="962" font-size="10.5" fill="#444">Backward influence (demand → upstream)</text>
  <rect x="780" y="952" width="14" height="14" fill="#fff" stroke="#7c3aa6" stroke-width="1.0" stroke-dasharray="4 3"/>
  <text x="800" y="962" font-size="10.5" fill="#444">Corner case (out-of-scope sink)</text>

</svg>
