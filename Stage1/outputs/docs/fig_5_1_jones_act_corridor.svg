<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" font-family="Calibri, 'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <marker id="arrowsmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- ====================== TOP HALF ====================== -->
  <text x="700" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">
    Same six million barrels, two structural placements
  </text>

  <!-- Column titles -->
  <text x="350" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#444" letter-spacing="2">SPREADSHEET</text>
  <text x="1050" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#444" letter-spacing="2">FRAMEWORK</text>
  <text x="350" y="100" text-anchor="middle" font-size="13" font-style="italic" fill="#666">PADD 5 stock identity</text>
  <text x="1050" y="100" text-anchor="middle" font-size="13" font-style="italic" fill="#666">asset graph fragment</text>

  <!-- ===== LEFT: spreadsheet table ===== -->
  <g>
    <rect x="100" y="120" width="500" height="240" fill="#fafafa" stroke="#999" stroke-width="1"/>
    <!-- header -->
    <rect x="100" y="120" width="500" height="34" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
    <text x="115" y="142" font-size="13" font-weight="bold" fill="#222">PADD 5 stock identity (kbbl)</text>
    <text x="540" y="142" text-anchor="end" font-size="13" font-weight="bold" fill="#222">value</text>
    <!-- rows -->
    <line x1="100" y1="180" x2="600" y2="180" stroke="#ccc"/>
    <text x="115" y="174" font-size="13" fill="#333">Commercial tank farms (named)</text>
    <text x="585" y="174" text-anchor="end" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#333">22,962</text>
    <line x1="100" y1="208" x2="600" y2="208" stroke="#ccc"/>
    <text x="115" y="202" font-size="13" fill="#333">Refinery stocks (PADD 5)</text>
    <text x="585" y="202" text-anchor="end" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#333">20,468</text>
    <line x1="100" y1="236" x2="600" y2="236" stroke="#ccc"/>
    <text x="115" y="230" font-size="13" fill="#333">SPR allocation to PADD 5</text>
    <text x="585" y="230" text-anchor="end" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#333">0</text>
    <!-- highlighted in-transit row -->
    <rect x="100" y="240" width="500" height="34" fill="#fff3e0" stroke="#e8a93a" stroke-width="1.5"/>
    <text x="115" y="262" font-size="13" font-weight="bold" fill="#7a4d00">In-transit by water (Jones Act)</text>
    <text x="585" y="262" text-anchor="end" font-size="13" font-family="Consolas, 'Courier New', monospace" font-weight="bold" fill="#7a4d00">5,900</text>
    <line x1="100" y1="302" x2="600" y2="302" stroke="#ccc"/>
    <text x="115" y="296" font-size="13" fill="#333">Total PADD 5 stocks (observed)</text>
    <text x="585" y="296" text-anchor="end" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#333">49,330</text>
    <text x="115" y="324" font-size="13" font-style="italic" fill="#777">Unallocated adjustment</text>
    <text x="585" y="324" text-anchor="end" font-size="13" font-family="Consolas, 'Courier New', monospace" fill="#777">0</text>
  </g>
  <!-- annotation under spreadsheet -->
  <g font-size="12" fill="#7a4d00">
    <text x="350" y="392" text-anchor="middle" font-style="italic">row labelled; value tied to EIA series</text>
    <text x="350" y="412" text-anchor="middle" fill="#a00">no neighbours, no flow variable,</text>
    <text x="350" y="430" text-anchor="middle" fill="#a00">no capacity ceiling, no mass-balance link</text>
  </g>

  <!-- ===== RIGHT: graph fragment ===== -->
  <g>
    <!-- PADD 3 outflow node -->
    <rect x="900" y="135" width="180" height="55" rx="6" fill="#eef5ff" stroke="#2a5fa0" stroke-width="1.5"/>
    <text x="990" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4070">padd3.outflow_to_padd5</text>
    <text x="990" y="178" text-anchor="middle" font-size="11" fill="#1a4070">PADD 3 outflow variable</text>

    <!-- edge: flow from PADD 3 to corridor -->
    <line x1="990" y1="190" x2="990" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="1005" y="215" font-size="11" font-style="italic" fill="#444">F_in_from_PADD3</text>

    <!-- corridor (in-transit) node — highlighted -->
    <rect x="870" y="230" width="240" height="100" rx="8" fill="#fff3e0" stroke="#e8a93a" stroke-width="2.5"/>
    <text x="990" y="255" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a4d00">inter_padd_3_to_5_agg</text>
    <line x1="890" y1="265" x2="1090" y2="265" stroke="#e8a93a" stroke-width="0.6" stroke-dasharray="3,3"/>
    <text x="890" y="284" font-size="12" font-family="Consolas, 'Courier New', monospace" fill="#7a4d00">stock     = 5,900 kbbl</text>
    <text x="890" y="302" font-size="12" font-family="Consolas, 'Courier New', monospace" fill="#7a4d00">cap_bd    = 1,400</text>
    <text x="890" y="320" font-size="12" font-family="Consolas, 'Courier New', monospace" fill="#7a4d00">ΔS = F_in − F_out + B</text>

    <!-- edge: flow from corridor to PADD 5 -->
    <line x1="990" y1="330" x2="990" y2="370" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="1005" y="355" font-size="11" font-style="italic" fill="#444">F_out_to_PADD5</text>

    <!-- PADD 5 inflow node -->
    <rect x="900" y="370" width="180" height="55" rx="6" fill="#eef5ff" stroke="#2a5fa0" stroke-width="1.5"/>
    <text x="990" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4070">padd5.inflow_from_padd3</text>
    <text x="990" y="413" text-anchor="middle" font-size="11" fill="#1a4070">PADD 5 inflow variable</text>
  </g>
  <!-- annotation under framework -->
  <g font-size="12" fill="#7a4d00">
    <text x="990" y="455" text-anchor="middle" font-style="italic">node with topology; value tied to same EIA series</text>
    <text x="990" y="475" text-anchor="middle" fill="#1a4070">neighbours, per-direction flow variables,</text>
    <text x="990" y="493" text-anchor="middle" fill="#1a4070">capacity ceiling, mass-balance link — structural</text>
  </g>

  <!-- divider -->
  <line x1="80" y1="540" x2="1320" y2="540" stroke="#bbb" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ====================== BOTTOM HALF ====================== -->
  <text x="700" y="580" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">
    When a grade dimension is added
  </text>
  <text x="700" y="603" text-anchor="middle" font-size="13" font-style="italic" fill="#666">
    spreadsheet rebuilds; the graph topology is unchanged
  </text>

  <!-- ===== LEFT: spreadsheet rebuild ===== -->
  <g>
    <rect x="100" y="625" width="500" height="380" fill="#fff5f5" stroke="#c66" stroke-width="1"/>
    <rect x="100" y="625" width="500" height="34" fill="#f8e0e0" stroke="#c66" stroke-width="1"/>
    <text x="115" y="647" font-size="13" font-weight="bold" fill="#811">Workbook (per-grade variant)</text>
    <text x="540" y="647" text-anchor="end" font-size="13" font-weight="bold" fill="#811">value</text>

    <g font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#444">
      <text x="115" y="678">tank farms × WTI</text>            <text x="585" y="678" text-anchor="end">…</text>
      <text x="115" y="697">tank farms × medium sour</text>    <text x="585" y="697" text-anchor="end">…</text>
      <text x="115" y="716">tank farms × ANS heavy</text>      <text x="585" y="716" text-anchor="end">…</text>
      <text x="115" y="735">refinery × WTI</text>              <text x="585" y="735" text-anchor="end">…</text>
      <text x="115" y="754">refinery × medium sour</text>      <text x="585" y="754" text-anchor="end">…</text>
      <text x="115" y="773">refinery × ANS heavy</text>        <text x="585" y="773" text-anchor="end">…</text>
    </g>
    <!-- highlighted: in-transit duplicated rows -->
    <rect x="100" y="780" width="500" height="120" fill="#ffe0e0" stroke="#c66" stroke-width="1"/>
    <g font-family="Consolas, 'Courier New', monospace" font-size="12" font-weight="bold" fill="#811">
      <text x="115" y="800">in-transit × WTI</text>            <text x="585" y="800" text-anchor="end">new residual</text>
      <text x="115" y="819">in-transit × medium sour</text>    <text x="585" y="819" text-anchor="end">new residual</text>
      <text x="115" y="838">in-transit × Bakken</text>         <text x="585" y="838" text-anchor="end">new residual</text>
      <text x="115" y="857">in-transit × ANS heavy</text>      <text x="585" y="857" text-anchor="end">new residual</text>
      <text x="115" y="876">in-transit × …</text>              <text x="585" y="876" text-anchor="end">new residual</text>
    </g>
    <g font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#444">
      <text x="115" y="925">pipelines × grade-mix</text>       <text x="585" y="925" text-anchor="end">…</text>
      <text x="115" y="944">PADD movements × grade</text>      <text x="585" y="944" text-anchor="end">…</text>
      <text x="115" y="963">⋮</text>                            <text x="585" y="963" text-anchor="end">⋮</text>
    </g>
  </g>
  <!-- annotation under spreadsheet rebuild -->
  <g font-size="12" fill="#811">
    <text x="350" y="1030" text-anchor="middle" font-style="italic">every column duplicates; every reconciliation rule</text>
    <text x="350" y="1048" text-anchor="middle" font-style="italic">redefined per grade; new workbook by a new analyst</text>
  </g>

  <!-- ===== RIGHT: framework data-layer pass ===== -->
  <g>
    <!-- PADD 3 outflow node (unchanged) -->
    <rect x="900" y="635" width="180" height="55" rx="6" fill="#eef5ff" stroke="#2a5fa0" stroke-width="1.5"/>
    <text x="990" y="660" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4070">padd3.outflow_to_padd5</text>
    <text x="990" y="678" text-anchor="middle" font-size="10" fill="#666" font-style="italic">(unchanged)</text>

    <line x1="990" y1="690" x2="990" y2="730" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- corridor (in-transit) node with per-grade stack -->
    <rect x="850" y="730" width="280" height="170" rx="8" fill="#e8f5e8" stroke="#3a7a3a" stroke-width="2.5"/>
    <text x="990" y="755" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a4d1a">inter_padd_3_to_5_agg</text>
    <line x1="870" y1="765" x2="1110" y2="765" stroke="#3a7a3a" stroke-width="0.6" stroke-dasharray="3,3"/>
    <g font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#1a4d1a">
      <text x="870" y="782">stock(WTI)         = …</text>
      <text x="870" y="800">stock(medium sour) = …</text>
      <text x="870" y="818">stock(Bakken)      = …</text>
      <text x="870" y="836">stock(ANS heavy)   = …</text>
      <text x="870" y="854">stock(…)           = …</text>
    </g>
    <text x="990" y="884" text-anchor="middle" font-size="11" font-style="italic" fill="#1a4d1a">ΔS_g = F_in,g − F_out,g + B_g  ∀ grade g</text>

    <line x1="990" y1="900" x2="990" y2="940" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- PADD 5 inflow node (unchanged) -->
    <rect x="900" y="940" width="180" height="55" rx="6" fill="#eef5ff" stroke="#2a5fa0" stroke-width="1.5"/>
    <text x="990" y="965" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a4070">padd5.inflow_from_padd3</text>
    <text x="990" y="983" text-anchor="middle" font-size="10" fill="#666" font-style="italic">(unchanged)</text>
  </g>
  <!-- annotation under framework rebuild -->
  <g font-size="12" fill="#1a4d1a">
    <text x="990" y="1030" text-anchor="middle" font-style="italic">same node, same edges; variables widen 1 → N</text>
    <text x="990" y="1048" text-anchor="middle" font-style="italic">data-layer pass, no topology change</text>
  </g>
</svg>
