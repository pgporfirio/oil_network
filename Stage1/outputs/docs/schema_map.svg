<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 1340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#444"/>
    </marker>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9 z" fill="#888"/>
    </marker>
  </defs>
  <style>
    .ttl       { font-size: 19px; font-weight: 700; fill: #111; }
    .sub       { font-size: 12px; fill: #666; }
    .lyr-num   { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; }
    .lyr-title { font-size: 13.5px; font-weight: 700; }
    .lyr-desc  { font-size: 11px; font-style: italic; }
    .tbl-name  { font-family: ui-monospace, "SF Mono", Consolas, Menlo, monospace; font-size: 12.5px; font-weight: 600; fill: #111; }
    .tbl-note  { font-size: 10.5px; fill: #555; }
    .arr-lbl   { font-size: 10px; fill: #555; font-style: italic; }
    .meta      { font-size: 10.5px; fill: #777; font-style: italic; }
    .pill      { font-family: ui-monospace, monospace; font-size: 9.5px; }
  </style>

  <text x="660" y="34" class="ttl" text-anchor="middle">oil_network — schema map</text>
  <text x="660" y="52" class="sub" text-anchor="middle">14 core tables + 4 node-scope (refactor pending) + 1 derived view</text>

  <!-- ============================================================== -->
  <!-- LAYER 1 — REALITY                                                -->
  <!-- ============================================================== -->
  <rect x="20" y="76" width="1280" height="148" rx="12" ry="12" fill="#fff5e6" stroke="#d99e3a" stroke-width="1.5"/>
  <text x="40" y="100" class="lyr-num" fill="#a06200">LAYER 1</text>
  <text x="40" y="118" class="lyr-title" fill="#7a4a00">REALITY</text>
  <text x="40" y="135" class="lyr-desc" fill="#7a4a00">what exists physically</text>

  <!-- locations -->
  <rect x="200" y="130" width="180" height="76" rx="6" ry="6" fill="#fff" stroke="#d99e3a" stroke-width="1.5"/>
  <text x="290" y="155" class="tbl-name" text-anchor="middle">locations</text>
  <text x="290" y="174" class="tbl-note" text-anchor="middle">lat / lon / region labels</text>
  <text x="290" y="190" class="tbl-note" text-anchor="middle">+ JSONB endpoint refs</text>

  <!-- assets -->
  <rect x="500" y="130" width="220" height="76" rx="6" ry="6" fill="#fff" stroke="#d99e3a" stroke-width="2"/>
  <text x="610" y="155" class="tbl-name" text-anchor="middle">assets</text>
  <text x="610" y="174" class="tbl-note" text-anchor="middle">identity + attrs + location_id</text>
  <text x="610" y="190" class="tbl-note" text-anchor="middle">kind: physical | abstract</text>

  <!-- metadata_production_assets (sister schema) -->
  <rect x="850" y="130" width="320" height="76" rx="6" ry="6" fill="#fffbf2" stroke="#d99e3a" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="1010" y="155" class="tbl-name" text-anchor="middle">metadata_production_assets</text>
  <text x="1010" y="174" class="tbl-note" text-anchor="middle">typed details (grade, capacity, ...)</text>
  <text x="1010" y="190" class="tbl-note" text-anchor="middle" font-style="italic">in sister schema oil_network_metadata</text>

  <!-- arrows L1 -->
  <path d="M 380 168 L 500 168" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="440" y="161" class="arr-lbl" text-anchor="middle">located_at</text>
  <path d="M 850 168 L 720 168" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="785" y="161" class="arr-lbl" text-anchor="middle">FK</text>

  <!-- L1 → L2: assets to nodes -->
  <path d="M 610 206 L 610 240 L 510 280" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-d)"/>
  <text x="630" y="232" class="arr-lbl">asset_id ↓</text>

  <!-- ============================================================== -->
  <!-- LAYER 2 — TOPOLOGY                                               -->
  <!-- ============================================================== -->
  <rect x="20" y="254" width="1280" height="338" rx="12" ry="12" fill="#e6f0ff" stroke="#3a78d9" stroke-width="1.5"/>
  <text x="40" y="278" class="lyr-num" fill="#1d4ea3">LAYER 2</text>
  <text x="40" y="296" class="lyr-title" fill="#143a7a">TOPOLOGY</text>
  <text x="40" y="313" class="lyr-desc" fill="#143a7a">the graph definition</text>

  <!-- dimension lookups, top of layer -->
  <rect x="200" y="290" width="140" height="44" rx="5" ry="5" fill="#fff" stroke="#3a78d9" stroke-width="1.2"/>
  <text x="270" y="316" class="tbl-name" text-anchor="middle">graphs</text>

  <rect x="360" y="290" width="160" height="44" rx="5" ry="5" fill="#fff" stroke="#3a78d9" stroke-width="1.2"/>
  <text x="440" y="316" class="tbl-name" text-anchor="middle">node_types</text>

  <rect x="780" y="290" width="180" height="44" rx="5" ry="5" fill="#fff" stroke="#3a78d9" stroke-width="1.2"/>
  <text x="870" y="316" class="tbl-name" text-anchor="middle">variable_types</text>

  <rect x="980" y="290" width="160" height="44" rx="5" ry="5" fill="#fff" stroke="#3a78d9" stroke-width="1.2"/>
  <text x="1060" y="316" class="tbl-name" text-anchor="middle">commodities</text>

  <!-- nodes (center-left, key) -->
  <rect x="320" y="430" width="220" height="86" rx="6" ry="6" fill="#fff" stroke="#3a78d9" stroke-width="2.2"/>
  <text x="430" y="455" class="tbl-name" text-anchor="middle">nodes</text>
  <text x="430" y="475" class="tbl-note" text-anchor="middle">graph_id + asset_id +</text>
  <text x="430" y="491" class="tbl-note" text-anchor="middle">node_type</text>
  <text x="430" y="507" class="tbl-note" text-anchor="middle" font-style="italic">214 rows</text>

  <!-- variables (center-right, key) -->
  <rect x="760" y="430" width="260" height="86" rx="6" ry="6" fill="#fff" stroke="#3a78d9" stroke-width="2.2"/>
  <text x="890" y="455" class="tbl-name" text-anchor="middle">variables</text>
  <text x="890" y="475" class="tbl-note" text-anchor="middle">node_id + variable_type + commodity</text>
  <text x="890" y="491" class="tbl-note" text-anchor="middle">+ related_node_id (for edges)</text>
  <text x="890" y="507" class="tbl-note" text-anchor="middle" font-style="italic">1,646 rows  (856 + 790 relational)</text>

  <!-- arrows L2 -->
  <!-- graphs → nodes -->
  <path d="M 270 334 L 380 430" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="290" y="385" class="arr-lbl">graph_id</text>
  <!-- node_types → nodes -->
  <path d="M 440 334 L 440 430" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="450" y="385" class="arr-lbl">node_type</text>

  <!-- variable_types → variables -->
  <path d="M 870 334 L 870 430" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="880" y="385" class="arr-lbl">variable_type</text>
  <!-- commodities → variables -->
  <path d="M 1060 334 L 980 430" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="1040" y="385" class="arr-lbl">commodity</text>

  <!-- nodes → variables (carries) -->
  <path d="M 540 462 L 760 462" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="650" y="455" class="arr-lbl" text-anchor="middle">node_id  (carries)</text>

  <!-- variables → nodes (relational / edges) -->
  <path d="M 800 516 C 700 575, 540 575, 470 516" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)" stroke-dasharray="2 2"/>
  <text x="635" y="568" class="arr-lbl" text-anchor="middle">related_node_id  (relational var = directed edge)</text>

  <!-- ============================================================== -->
  <!-- LAYER 3 — CATALOG                                                -->
  <!-- ============================================================== -->
  <rect x="20" y="616" width="1280" height="148" rx="12" ry="12" fill="#e6ffe6" stroke="#3aa653" stroke-width="1.5"/>
  <text x="40" y="640" class="lyr-num" fill="#1f6b32">LAYER 3</text>
  <text x="40" y="658" class="lyr-title" fill="#0f4a1d">DATA CATALOG</text>
  <text x="40" y="675" class="lyr-desc" fill="#0f4a1d">timeseries</text>

  <rect x="200" y="666" width="180" height="70" rx="6" ry="6" fill="#fff" stroke="#3aa653" stroke-width="1.5"/>
  <text x="290" y="691" class="tbl-name" text-anchor="middle">timeseries_types</text>
  <text x="290" y="710" class="tbl-note" text-anchor="middle">6 types (production, ...)</text>

  <rect x="450" y="666" width="200" height="70" rx="6" ry="6" fill="#fff" stroke="#3aa653" stroke-width="1.5"/>
  <text x="550" y="691" class="tbl-name" text-anchor="middle">timeseries</text>
  <text x="550" y="710" class="tbl-note" text-anchor="middle">EIA series + others</text>

  <rect x="720" y="666" width="240" height="70" rx="6" ry="6" fill="#fff" stroke="#3aa653" stroke-width="1.5"/>
  <text x="840" y="691" class="tbl-name" text-anchor="middle">timeseries_data</text>
  <text x="840" y="710" class="tbl-note" text-anchor="middle">period_start, value</text>

  <text x="1020" y="690" class="meta" fill="#0f4a1d">written by</text>
  <text x="1020" y="704" class="meta" fill="#0f4a1d">oil_network_data_loader.*</text>
  <text x="1020" y="720" class="meta" fill="#0f4a1d">(sister schema)</text>

  <path d="M 380 700 L 450 700" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="415" y="693" class="arr-lbl" text-anchor="middle">type</text>
  <path d="M 650 700 L 720 700" fill="none" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="685" y="693" class="arr-lbl" text-anchor="middle">timeseries_id</text>

  <!-- ============================================================== -->
  <!-- LAYER 4 — PER-SCENARIO BINDING                                   -->
  <!-- ============================================================== -->
  <rect x="20" y="794" width="1280" height="430" rx="12" ry="12" fill="#f4e8ff" stroke="#7c3aa6" stroke-width="1.5"/>
  <text x="40" y="818" class="lyr-num" fill="#5a1d80">LAYER 4</text>
  <text x="40" y="836" class="lyr-title" fill="#3d0e5a">PER-SCENARIO BINDING</text>
  <text x="40" y="853" class="lyr-desc" fill="#3d0e5a">when and how each variable resolves to a value</text>

  <!-- scenarios -->
  <rect x="180" y="870" width="200" height="80" rx="6" ry="6" fill="#fff" stroke="#7c3aa6" stroke-width="2.2"/>
  <text x="280" y="895" class="tbl-name" text-anchor="middle">scenarios</text>
  <text x="280" y="914" class="tbl-note" text-anchor="middle">graph_id + time range</text>
  <text x="280" y="930" class="tbl-note" text-anchor="middle">+ frequency</text>
  <text x="280" y="946" class="tbl-note" text-anchor="middle" font-style="italic">starter_us_crude_2015_2025</text>

  <!-- variable_assignments (key) -->
  <rect x="490" y="860" width="320" height="110" rx="6" ry="6" fill="#fff" stroke="#7c3aa6" stroke-width="2.2"/>
  <text x="650" y="884" class="tbl-name" text-anchor="middle">variable_assignments</text>
  <text x="650" y="903" class="tbl-note" text-anchor="middle">PK: scenario_id + variable_id + effective_from</text>
  <text x="650" y="920" class="tbl-note" text-anchor="middle">kind ∈ { timeseries | formula | zero }</text>
  <text x="650" y="936" class="tbl-note" text-anchor="middle">+ timeseries_id  |  + formula + formula_inputs[]</text>
  <text x="650" y="956" class="tbl-note" text-anchor="middle" font-style="italic">the load-bearing primitive — see principle 2.4</text>

  <!-- node_scopes (slated for refactor) -->
  <rect x="900" y="850" width="180" height="50" rx="5" ry="5" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="990" y="880" class="tbl-name" text-anchor="middle">node_scopes</text>

  <rect x="1110" y="828" width="190" height="32" rx="4" ry="4" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.0" stroke-dasharray="3 2"/>
  <text x="1205" y="848" class="tbl-name" text-anchor="middle" font-size="11px">node_scope_authorisations</text>

  <rect x="1110" y="868" width="190" height="32" rx="4" ry="4" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.0" stroke-dasharray="3 2"/>
  <text x="1205" y="888" class="tbl-name" text-anchor="middle" font-size="11px">node_scope_collapsed_nodes</text>

  <rect x="1110" y="908" width="190" height="32" rx="4" ry="4" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.0" stroke-dasharray="3 2"/>
  <text x="1205" y="928" class="tbl-name" text-anchor="middle" font-size="11px">node_scope_notes</text>

  <text x="1190" y="965" class="meta" text-anchor="middle" fill="#7c3aa6">↑ slated to collapse into</text>
  <text x="1190" y="978" class="meta" text-anchor="middle" fill="#7c3aa6">variable_assignments + scenario_notes</text>

  <!-- node_type_default_formulas -->
  <rect x="490" y="1010" width="320" height="60" rx="5" ry="5" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="650" y="1034" class="tbl-name" text-anchor="middle">node_type_default_formulas</text>
  <text x="650" y="1053" class="tbl-note" text-anchor="middle">fallbacks: applied when no explicit row</text>

  <!-- resolution_hierarchy VIEW -->
  <rect x="180" y="1010" width="240" height="60" rx="5" ry="5" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="300" y="1034" class="tbl-name" text-anchor="middle">resolution_hierarchy</text>
  <text x="300" y="1053" class="tbl-note" text-anchor="middle">VIEW (parent_id → child_id)</text>

  <!-- pill -->
  <rect x="180" y="1090" width="630" height="100" rx="6" ry="6" fill="#fff" stroke="#7c3aa6" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.85"/>
  <text x="195" y="1112" class="tbl-name" font-size="11.5px" fill="#5a1d80">notes</text>
  <text x="195" y="1130" class="tbl-note">• `assignment_kind = 'timeseries'` rows reference Layer 3; `'formula'` rows reference other variable_ids in</text>
  <text x="195" y="1145" class="tbl-note">  formula_inputs[] (used for cycle detection + topo-sort by the evaluator).</text>
  <text x="195" y="1162" class="tbl-note">• `resolution_hierarchy` is a VIEW (no primary table) — derived from rows where formula='sum_over_children'.</text>
  <text x="195" y="1178" class="tbl-note">• `node_scope_*` carries facts already implicit in `variable_assignments` (TS-bound = authoritative; zero = collapsed).</text>

  <!-- arrows L4 -->

  <!-- graphs (L2) → scenarios (L4): cross-layer dashed -->
  <path d="M 270 334 C 110 500, 110 760, 180 890" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-d)"/>
  <text x="100" y="700" class="arr-lbl" font-style="italic">graph_id</text>

  <!-- scenarios → variable_assignments -->
  <path d="M 380 905 L 490 905" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="435" y="898" class="arr-lbl" text-anchor="middle">scenario_id</text>

  <!-- variables (L2) → variable_assignments: cross-layer -->
  <path d="M 890 516 C 890 700, 700 800, 670 860" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-d)"/>
  <text x="850" y="640" class="arr-lbl" font-style="italic">variable_id</text>

  <!-- timeseries (L3) → variable_assignments: cross-layer -->
  <path d="M 550 736 L 590 860" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-d)"/>
  <text x="455" y="800" class="arr-lbl" font-style="italic">timeseries_id (TS-bound)</text>

  <!-- scenarios → node_scopes -->
  <path d="M 380 875 L 900 875" fill="none" stroke="#888" stroke-width="1.0" marker-end="url(#arr-d)" opacity="0.7"/>
  <text x="850" y="868" class="arr-lbl" text-anchor="middle" opacity="0.8">scenario_id</text>

  <!-- node_scopes → 3 children -->
  <path d="M 1080 865 L 1110 844" fill="none" stroke="#888" stroke-width="1.0" marker-end="url(#arr-d)"/>
  <path d="M 1080 875 L 1110 884" fill="none" stroke="#888" stroke-width="1.0" marker-end="url(#arr-d)"/>
  <path d="M 1080 885 L 1110 924" fill="none" stroke="#888" stroke-width="1.0" marker-end="url(#arr-d)"/>

  <!-- ===================================================== -->
  <!-- LEGEND                                                   -->
  <!-- ===================================================== -->
  <rect x="20" y="1240" width="1280" height="90" rx="10" ry="10" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="40" y="1260" font-size="11" font-weight="700" letter-spacing="1.2" fill="#444">LEGEND</text>

  <!-- Layer colour bands -->
  <rect x="40"  y="1273" width="14" height="14" fill="#fff5e6" stroke="#d99e3a"/>
  <text x="60" y="1285" font-size="10.5" fill="#444">Layer 1 — Reality (locations, assets)</text>
  <rect x="280" y="1273" width="14" height="14" fill="#e6f0ff" stroke="#3a78d9"/>
  <text x="300" y="1285" font-size="10.5" fill="#444">Layer 2 — Topology (graph, nodes, variables)</text>
  <rect x="580" y="1273" width="14" height="14" fill="#e6ffe6" stroke="#3aa653"/>
  <text x="600" y="1285" font-size="10.5" fill="#444">Layer 3 — Catalog (timeseries)</text>
  <rect x="830" y="1273" width="14" height="14" fill="#f4e8ff" stroke="#7c3aa6"/>
  <text x="850" y="1285" font-size="10.5" fill="#444">Layer 4 — Per-scenario binding</text>
  <rect x="1080" y="1273" width="14" height="14" fill="#fffbf2" stroke="#d99e3a" stroke-dasharray="5 3"/>
  <text x="1100" y="1285" font-size="10.5" fill="#444">Sister schema (separate)</text>

  <!-- Symbol conventions -->
  <line x1="40" y1="1308" x2="82" y2="1308" stroke="#444" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="90" y="1312" font-size="10.5" fill="#444">Within-layer FK</text>
  <line x1="220" y1="1308" x2="262" y2="1308" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr-d)"/>
  <text x="270" y="1312" font-size="10.5" fill="#444">Cross-layer FK</text>
  <rect x="400" y="1302" width="14" height="14" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="420" y="1312" font-size="10.5" fill="#444">VIEW (derived, not stored)</text>
  <rect x="600" y="1302" width="14" height="14" fill="#faf3ff" stroke="#7c3aa6" stroke-width="1.0" stroke-dasharray="3 2"/>
  <text x="620" y="1312" font-size="10.5" fill="#444">Slated for refactor</text>

</svg>
